<!DOCTYPE html>
<html>
<head>
    <title>black and white</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'courier new', monospace; overflow: hidden; text-transform: lowercase; }
        canvas { display: block; cursor: crosshair; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 10; }
        #editor_ui { position: absolute; top: 0; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 10px; background: #000; border-bottom: 1px solid #fff; z-index: 5; }
        
        input, button { background: #000; border: 1px solid #fff; color: #fff; padding: 8px 15px; font-family: 'courier new'; cursor: pointer; text-transform: lowercase; outline: none; }
        button:hover { background: #fff; color: #000; }
        .active_tool { background: #fff; color: #000; }
        
        #level_list { margin-top: 20px; width: 350px; max-height: 250px; overflow-y: auto; border: 1px solid #fff; padding: 10px; }
        .level_item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="login_screen" class="screen">
    <h1>black and white</h1>
    <input type="text" id="user_input" placeholder="username">
    <button onclick="login()" style="margin-top:15px">login</button>
</div>

<div id="home_screen" class="screen" style="display:none">
    <h1>welcome, <span id="display_name"></span></h1>
    <div style="display:flex; gap:10px">
        <button onclick="init_new_level()">new level</button>
        <input type="text" id="join_code_input" placeholder="6-digit code">
        <button onclick="join_by_code()">join game</button>
    </div>
    <h3>your levels:</h3>
    <div id="level_list"></div>
</div>

<div id="editor_ui" style="display:none">
    <button class="tool_btn" id="btn_block" onclick="set_tool('block')">block</button>
    <button class="tool_btn" onclick="set_tool('spike')">spike</button>
    <button class="tool_btn" onclick="set_tool('saw')">saw</button>
    <button class="tool_btn" onclick="set_tool('start')">start</button>
    <button class="tool_btn" onclick="set_tool('end')">end</button>
    <button class="tool_btn" onclick="set_tool('delete')">delete</button>
    <div style="width:20px"></div>
    <button onclick="toggle_mode()" id="play_btn">playtest</button>
    <button onclick="share_level()">share</button>
    <button onclick="exit_to_home()">home</button>
    <span id="room_code_display" style="margin-left:10px; border:1px solid #fff; padding:5px; display:none"></span>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let user = localStorage.getItem('bw_active_user') || "";
let my_levels = JSON.parse(localStorage.getItem('bw_levels') || "[]");
let current_level = null;
let mode = 'menu'; 
let tool = 'block';
let cam = { x: 0, y: 0 };
let player = { x: 0, y: 0, vx: 0, vy: 0, r: 8, color: 180, on_ground: false };
let keys = {};
let is_dragging = false;

// automatically show home if logged in
window.onload = () => { if(user) { document.getElementById('user_input').value = user; login(); } };

function login() {
    user = document.getElementById('user_input').value;
    if (!user) return;
    localStorage.setItem('bw_active_user', user);
    document.getElementById('login_screen').style.display = 'none';
    document.getElementById('home_screen').style.display = 'flex';
    document.getElementById('display_name').innerText = user;
    render_level_list();
}

function render_level_list() {
    const list = document.getElementById('level_list');
    list.innerHTML = "";
    my_levels.forEach((lvl, idx) => {
        list.innerHTML += `<div class="level_item">
            <span>${lvl.name}</span>
            <div>
                <button onclick="load_saved_level(${idx})">edit</button>
                <button onclick="delete_level(${idx})">delete</button>
            </div>
        </div>`;
    });
}

function init_new_level() {
    const name = prompt("level name:");
    if (!name) return;
    current_level = { name: name, objects: [], start: {x:100, y:100} };
    start_editor();
}

function load_saved_level(idx) {
    current_level = my_levels[idx];
    start_editor();
}

function delete_level(idx) {
    if(confirm("delete level?")) {
        my_levels.splice(idx, 1);
        save_all_levels();
        render_level_list();
    }
}

function start_editor() {
    document.getElementById('home_screen').style.display = 'none';
    document.getElementById('editor_ui').style.display = 'flex';
    mode = 'edit';
    set_tool('block');
    loop();
}

function exit_to_home() {
    save_current_to_list();
    document.getElementById('editor_ui').style.display = 'none';
    document.getElementById('home_screen').style.display = 'flex';
    mode = 'menu';
    render_level_list();
}

// --- editor ---
function set_tool(t) {
    tool = t;
    document.querySelectorAll('.tool_btn').forEach(b => b.classList.remove('active_tool'));
    Array.from(document.querySelectorAll('.tool_btn')).find(b => b.innerText === t).classList.add('active_tool');
}

canvas.onmousedown = (e) => { is_dragging = true; edit_action(e); };
canvas.onmouseup = () => { is_dragging = false; save_current_to_list(); };
canvas.onmousemove = (e) => { if (is_dragging) edit_action(e); };

function edit_action(e) {
    if (mode !== 'edit') return;
    const gx = Math.floor((e.clientX + cam.x) / 20) * 20;
    const gy = Math.floor((e.clientY + cam.y) / 20) * 20;

    if (tool === 'delete') {
        current_level.objects = current_level.objects.filter(o => o.x !== gx || o.y !== gy);
    } else if (tool === 'start') {
        current_level.start = {x: gx, y: gy};
    } else {
        if (!current_level.objects.find(o => o.x === gx && o.y === gy)) {
            current_level.objects.push({ x: gx, y: gy, type: tool, r: 0 });
        }
    }
}

// --- loop & physics ---
function loop() {
    if (mode === 'menu') return;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    current_level.objects.forEach(o => {
        ctx.fillStyle = '#fff';
        if (o.type === 'block') {
            ctx.fillRect(o.x, o.y, 20, 20);
        } else if (o.type === 'spike') {
            ctx.beginPath(); ctx.moveTo(o.x, o.y+20); ctx.lineTo(o.x+10, o.y); ctx.lineTo(o.x+20, o.y+20); ctx.fill();
        } else if (o.type === 'saw') {
            ctx.save(); ctx.translate(o.x+10, o.y+10); o.r += 0.1; ctx.rotate(o.r);
            for(let i=0; i<8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-2,-12,4,24); }
            ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
            ctx.restore();
        } else if (o.type === 'end') {
            ctx.strokeStyle = '#fff'; ctx.setLineDash([4,4]); ctx.strokeRect(o.x, o.y, 20, 20); ctx.setLineDash([]);
        }
    });
    
    // start indicator
    ctx.strokeStyle = '#444'; ctx.strokeRect(current_level.start.x, current_level.start.y, 20, 20);

    if (mode === 'play') {
        update_player();
        ctx.fillStyle = `rgb(${player.color},${player.color},${player.color})`;
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    } else {
        if (keys['ArrowUp']) cam.y -= 5; if (keys['ArrowDown']) cam.y += 5;
        if (keys['ArrowLeft']) cam.x -= 5; if (keys['ArrowRight']) cam.x += 5;
    }
    ctx.restore();
    requestAnimationFrame(loop);
}

function update_player() {
    if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 0.6;
    if (keys['ArrowRight'] || keys['KeyD']) player.vx += 0.6;
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.on_ground) { player.vy = -9; player.on_ground = false; }

    player.vy += 0.5; // gravity
    player.vx *= 0.85; // friction
    player.x += player.vx;
    player.y += player.vy;

    player.on_ground = false;
    current_level.objects.forEach(o => {
        if (o.type === 'block') {
            if (player.x + player.r > o.x && player.x - player.r < o.x + 20 && player.y + player.r > o.y && player.y - player.r < o.y + 20) {
                let ox = (player.x < o.x + 10) ? (player.x + player.r - o.x) : (o.x + 20 - (player.x - player.r));
                let oy = (player.y < o.y + 10) ? (player.y + player.r - o.y) : (o.y + 20 - (player.y - player.r));
                if (ox > oy) {
                    if (player.vy > 0 && player.y < o.y) { player.y = o.y - player.r; player.vy = 0; player.on_ground = true; }
                    else if (player.vy < 0) { player.y = o.y + 20 + player.r; player.vy = 0; }
                } else {
                    if (player.vx > 0 && player.x < o.x) { player.x = o.x - player.r; player.vx = 0; }
                    else if (player.vx < 0) { player.x = o.x + 20 + player.r; player.vx = 0; }
                }
            }
        }
        if (o.type === 'spike' || o.type === 'saw') {
            if (Math.hypot(player.x - (o.x+10), player.y - (o.y+10)) < player.r + 5) reset_player();
        }
    });
}

function toggle_mode() {
    mode = mode === 'edit' ? 'play' : 'edit';
    document.getElementById('play_btn').innerText = mode === 'play' ? 'stop' : 'playtest';
    if(mode === 'play') reset_player();
}

function reset_player() {
    player.x = current_level.start.x + 10;
    player.y = current_level.start.y + 10;
    player.vx = 0; player.vy = 0;
}

// --- multiplayer ---
function share_level() {
    socket.emit('host_level', current_level);
}

socket.on('level_code', code => {
    const display = document.getElementById('room_code_display');
    display.innerText = "code: " + code;
    display.style.display = 'inline';
});

function join_by_code() {
    const code = document.getElementById('join_code_input').value;
    if(code) socket.emit('join_room', code);
}

socket.on('load_level', lvl => {
    current_level = lvl;
    start_editor();
});

// --- data ---
function save_current_to_list() {
    if (!current_level) return;
    const idx = my_levels.findIndex(l => l.name === current_level.name);
    if (idx > -1) my_levels[idx] = current_level;
    else my_levels.push(current_level);
    save_all_levels();
}

function save_all_levels() {
    localStorage.setItem('bw_levels', JSON.stringify(my_levels));
}

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;
</script>
</body>
</html>
