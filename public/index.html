<!DOCTYPE html>
<html>
<head>
    <title>onlineshooter</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: #333; padding: 20px; border-radius: 10px; }
        canvas { background: #111; display: none; }
        #dead-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>online shooter</h1>
        <input type="text" id="nick" placeholder="Nickname" maxlength="10"><br><br>
        <button onclick="startGame()">join game</button>
    </div>

    <div id="dead-screen">
        <h1>you died</h1>
        <button onclick="revive()">revive</button>
    </div>

    <canvas id="game"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let players = {};
        let myId = null;
        let bullets = [];

        const map = [
            {x: 0, y: 0, w: 800, h: 20}, {x: 0, y: 580, w: 800, h: 20}, // Walls
            {x: 0, y: 0, w: 20, h: 600}, {x: 780, y: 0, w: 20, h: 600},
            {x: 200, y: 150, w: 20, h: 300}, {x: 400, y: 0, w: 20, h: 200}, // Barriers
            {x: 550, y: 350, w: 200, h: 20}, {x: 400, y: 400, w: 100, h: 100}
        ];

        function startGame() {
            const name = document.getElementById('nick').value || "Guest";
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = 800; canvas.height = 600;
            myId = socket.id;
            socket.emit('join', { name });
            requestAnimationFrame(gameLoop);
        }

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function gameLoop() {
            const me = players[socket.id];
            if (me && me.hp > 0) {
                let moveSpeed = 3;
                let rotSpeed = 0.05;

                if (keys['KeyW'] || keys['ArrowUp']) {
                    me.x += Math.cos(me.angle) * moveSpeed;
                    me.y += Math.sin(me.angle) * moveSpeed;
                }
                if (keys['KeyS'] || keys['ArrowDown']) {
                    me.x -= Math.cos(me.angle) * moveSpeed;
                    me.y -= Math.sin(me.angle) * moveSpeed;
                }
                if (keys['KeyA'] || keys['ArrowLeft']) me.angle -= rotSpeed;
                if (keys['KeyD'] || keys['ArrowRight']) me.angle += rotSpeed;

                // Collision with map
                map.forEach(w => {
                    if (me.x > w.x && me.x < w.x + w.w && me.y > w.y && me.y < w.y + w.h) {
                        me.x -= Math.cos(me.angle) * moveSpeed;
                        me.y -= Math.sin(me.angle) * moveSpeed;
                    }
                });

                if (keys['Space']) {
                    socket.emit('shoot', {
                        x: me.x, y: me.y, angle: me.angle, bounces: 0, owner: socket.id
                    });
                    keys['Space'] = false;
                }

                socket.emit('move', { x: me.x, y: me.y, angle: me.angle });
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Map
            ctx.fillStyle = '#444';
            map.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

            // Draw Players
            Object.values(players).forEach(p => {
                if (p.hp <= 0) {
                    if (p.id === socket.id) document.getElementById('dead-screen').style.display = 'block';
                    return;
                }
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'white'; ctx.fillRect(10, -2, 10, 4); // Direction indicator
                ctx.restore();

                // HP Bar
                ctx.fillStyle = 'red'; ctx.fillRect(p.x - 20, p.y - 30, 40, 5);
                ctx.fillStyle = 'green'; ctx.fillRect(p.x - 20, p.y - 30, (p.hp/100)*40, 5);
                ctx.fillText(p.name, p.x - 15, p.y - 35);
            });

            // Update & Draw Bullets
            bullets.forEach((b, i) => {
                b.x += Math.cos(b.angle) * 7;
                b.y += Math.sin(b.angle) * 7;

                map.forEach(w => {
                    if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                        if (b.x < w.x || b.x > w.x + w.w) b.angle = Math.PI - b.angle;
                        else b.angle = -b.angle;
                        b.bounces++;
                    }
                });

                if (b.bounces > 3) bullets.splice(i, 1);
                
                // Hit check
                const me = players[socket.id];
                if (me && Math.hypot(me.x - b.x, me.y - b.y) < 20 && b.owner !== socket.id) {
                    socket.emit('hit', socket.id);
                    bullets.splice(i, 1);
                }

                ctx.fillStyle = 'yellow';
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            });
        }

        socket.on('updatePlayers', data => players = data);
        socket.on('newBullet', b => bullets.push(b));
        function revive() { 
            document.getElementById('dead-screen').style.display = 'none';
            socket.emit('revive'); 
        }
    </script>
</body>
</html>
