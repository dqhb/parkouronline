<!DOCTYPE html>
<html>
<head>
    <title>black and white</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; border: 1px solid #fff; margin: auto; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { pointer-events: auto; background: #000; border: 1px solid #fff; padding: 15px; position: absolute; }
        #editor-bar { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .btn { background: #000; color: #fff; border: 1px solid #fff; padding: 5px 15px; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #fff; color: #000; }
        .active-tool { background: #fff; color: #000; }
        #login-screen { width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; position: absolute;}
        input { background: #000; border: 1px solid #fff; color: #fff; padding: 10px; text-align: center; outline: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>black and white</h1>
    <input type="text" id="usernameInput" placeholder="ENTER USERNAME">
    <br>
    <button class="btn" onclick="login()">start</button>
</div>

<div id="ui-layer" style="display:none">
    <h1 style="position:absolute; top:10px; left:20px;">black and white</h1>
    <div id="editor-bar">
        <button class="btn tool" onclick="setTool('block')">block</button>
        <button class="btn tool" onclick="setTool('spike')">spike</button>
        <button class="btn tool" onclick="setTool('saw')">saw</button>
        <button class="btn tool" onclick="setTool('start')">start</button>
        <button class="btn tool" onclick="setTool('end')">end</button>
        <button class="btn tool" onclick="setTool('delete')">delete</button>
        <button class="btn" onclick="togglePlay()">playtest</button>
        <button class="btn" onclick="hostLevel()">host</button>
    </div>
    <div class="panel" style="top:70px; left:20px;">
        code: <span id="roomDisplay">------</span><br>
        name: <span id="levelNameDisplay"></span>
    </div>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let username = localStorage.getItem('bw_user') || "";
let level = { name: "New Level", objects: [], start: {x:100, y:100} };
let mode = 'edit'; // 'edit' or 'play'
let tool = 'block';
let cam = { x: 0, y: 0 };
let player = { x: 0, y: 0, vx: 0, vy: 0, r: 10, color: 150 };
let isDragging = false;
let selected = null;
let keys = {};

// --- EDITOR LOGIC ---
function setTool(t) { 
    tool = t; 
    document.querySelectorAll('.tool').forEach(b => b.classList.remove('active-tool'));
}

canvas.onmousedown = (e) => { isDragging = true; place(e); };
canvas.onmouseup = () => { isDragging = false; save(); };
canvas.onmousemove = (e) => { if(isDragging) place(e); };

function place(e) {
    if (mode !== 'edit') return;
    const gx = Math.floor((e.clientX + cam.x) / 20) * 20;
    const gy = Math.floor((e.clientY + cam.y) / 20) * 20;

    if (tool === 'delete') {
        level.objects = level.objects.filter(o => o.x !== gx || o.y !== gy);
    } else if (tool === 'start') {
        level.start = {x: gx, y: gy};
    } else {
        // Prevent stacking
        if (!level.objects.find(o => o.x === gx && o.y === gy)) {
            level.objects.push({x: gx, y: gy, type: tool, rotate: 0, scale: 1, spin: true});
        }
    }
}

// --- PHYSICS ---
function loop() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    // Draw Objects
    level.objects.forEach(o => {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        if (o.type === 'block') ctx.strokeRect(o.x, o.y, 20, 20);
        if (o.type === 'spike') {
            ctx.beginPath(); ctx.moveTo(o.x, o.y+20); ctx.lineTo(o.x+10, o.y); ctx.lineTo(o.x+20, o.y+20); ctx.closePath(); ctx.stroke();
        }
        if (o.type === 'saw') {
            ctx.save();
            ctx.translate(o.x+10, o.y+10);
            if(o.spin) o.rotate += 0.1;
            ctx.rotate(o.rotate);
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI/4);
                ctx.strokeRect(-2, -12, 4, 24);
            }
            ctx.restore();
        }
        if (o.type === 'end') { ctx.setLineDash([5, 5]); ctx.strokeRect(o.x, o.y, 20, 20); ctx.setLineDash([]); }
    });

    // Start block
    ctx.strokeStyle = '#888';
    ctx.strokeRect(level.start.x, level.start.y, 20, 20);

    if (mode === 'play') {
        // Player movement
        if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= 0.5;
        if (keys['ArrowRight'] || keys['KeyD']) player.vx += 0.5;
        if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW']) && player.onGround) player.vy = -10;

        player.vy += 0.5; // Gravity
        player.vx *= 0.9;
        player.x += player.vx;
        player.y += player.vy;
        player.onGround = false;

        // Simple Solid Collision
        level.objects.forEach(o => {
            if (o.type === 'block') {
                if (player.x + 10 > o.x && player.x - 10 < o.x + 20 && player.y + 10 > o.y && player.y - 10 < o.y + 20) {
                    // Vertical resolution
                    if (player.vy > 0 && player.y < o.y) { player.y = o.y - 10; player.vy = 0; player.onGround = true; }
                    else if (player.vy < 0 && player.y > o.y + 20) { player.y = o.y + 30; player.vy = 0; }
                    // Horizontal resolution
                    else if (player.vx > 0) player.x = o.x - 10;
                    else if (player.vx < 0) player.x = o.x + 30;
                }
            }
            // Death
            if (o.type === 'spike' || o.type === 'saw') {
                let dist = Math.hypot(player.x - (o.x+10), player.y - (o.y+10));
                if (dist < 15) resetPlayer();
            }
        });

        ctx.fillStyle = `rgb(${player.color},${player.color},${player.color})`;
        ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
    } else {
        // Editor Camera
        if (keys['ArrowUp']) cam.y -= 5;
        if (keys['ArrowDown']) cam.y += 5;
        if (keys['ArrowLeft']) cam.x -= 5;
        if (keys['ArrowRight']) cam.x += 5;
    }

    ctx.restore();
    requestAnimationFrame(loop);
}

function login() {
    const user = document.getElementById('usernameInput').value;
    if (user) {
        username = user;
        localStorage.setItem('bw_user', user);
        socket.emit('login', user);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('ui-layer').style.display = 'block';
        
        const existingLevel = localStorage.getItem('bw_last_level');
        if (existingLevel) level = JSON.parse(existingLevel);
        else {
            const name = prompt("NAME YOUR LEVEL:");
            level.name = name || "New Level";
        }
        document.getElementById('levelNameDisplay').innerText = level.name;
        loop();
    }
}

function save() { 
    localStorage.setItem('bw_last_level', JSON.stringify(level));
    socket.emit('saveLevel', level); 
}

function resetPlayer() { player.x = level.start.x + 10; player.y = level.start.y + 10; player.vx = 0; player.vy = 0; }
function togglePlay() { mode = mode === 'edit' ? 'play' : 'edit'; if(mode === 'play') resetPlayer(); }
function hostLevel() { socket.emit('hostLevel', level); }

window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;
socket.on('levelCode', code => document.getElementById('roomDisplay').innerText = code);

if (username) {
    document.getElementById('usernameInput').value = username;
}
</script>
</body>
</html>
